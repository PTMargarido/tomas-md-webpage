<header class="navbar" role="banner">
  <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="nav-menu">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="3" y1="6" x2="21" y2="6"></line>
      <line x1="3" y1="12" x2="21" y2="12"></line>
      <line x1="3" y1="18" x2="21" y2="18"></line>
    </svg>
  </button>
  <nav id="nav-menu" class="nav-links" role="navigation" aria-label="Main navigation">
    {{ range .Site.Menus.main }}
    <a href="{{ .URL | relLangURL }}" class="nav-link">{{ .Name }}</a>
    {{ end }}
  </nav>
</header>
